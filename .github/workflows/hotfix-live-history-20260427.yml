name: Hotfix Live History 20260427

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/hotfix-live-history-20260427.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: kospipreview

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: kospipreview

      - name: Patch and verify 2026-04-27 history row
        shell: bash
        run: |
          set -euo pipefail
          service_json="$(mktemp)"
          gcloud run services describe kospi-live-data --region asia-northeast3 --format=json > "$service_json"
          eval "$(python - "$service_json" <<'PY'
import json
import shlex
import sys

with open(sys.argv[1], "r", encoding="utf-8") as f:
    service = json.load(f)

containers = (
    service.get("spec", {})
    .get("template", {})
    .get("spec", {})
    .get("containers", [])
)
env_rows = containers[0].get("env", []) if containers else []
env = {row.get("name"): row.get("value", "") for row in env_rows if isinstance(row, dict)}
bucket = (env.get("LIVE_DATA_BUCKET") or "kospipreview-live-data").strip()
prefix = (env.get("LIVE_DATA_PREFIX") or "").strip().strip("/")
print(f"BUCKET={shlex.quote(bucket)}")
print(f"PREFIX={shlex.quote(prefix)}")
PY
          )"

          blob="${PREFIX:+$PREFIX/}history.json"
          object="gs://$BUCKET/$blob"
          echo "Patching $object"

          tmp="$(mktemp)"
          gcloud storage cp "$object" "$tmp" --quiet

          python - "$tmp" <<'PY'
import json
import sys
from datetime import datetime, timezone

path = sys.argv[1]
with open(path, "r", encoding="utf-8") as f:
    payload = json.load(f)

records = payload.get("records") or []
row = next((r for r in records if isinstance(r, dict) and r.get("date") == "2026-04-27"), None)
if row is None:
    raise SystemExit("2026-04-27 row not found")

before = {k: row.get(k) for k in ("date", "actualOpen", "modelPrediction", "low", "high", "hit")}
row["modelPrediction"] = 6503.13
row["low"] = 6472.38
row["high"] = 6533.88
row["hit"] = True
payload["generatedAt"] = datetime.now(timezone.utc).isoformat()
after = {k: row.get(k) for k in ("date", "actualOpen", "modelPrediction", "low", "high", "hit")}
print("before", json.dumps(before, ensure_ascii=False, sort_keys=True))
print("after", json.dumps(after, ensure_ascii=False, sort_keys=True))

with open(path, "w", encoding="utf-8") as f:
    json.dump(payload, f, ensure_ascii=False, indent=2)
    f.write("\n")
PY

          gcloud storage cp "$tmp" "$object" --cache-control=no-store --content-type="application/json; charset=utf-8" --quiet

          verify="$(mktemp)"
          gcloud storage cp "$object" "$verify" --quiet
          python - "$verify" <<'PY'
import json
import sys

with open(sys.argv[1], "r", encoding="utf-8") as f:
    payload = json.load(f)
row = next(r for r in payload["records"] if r.get("date") == "2026-04-27")
print("bucket_verify", json.dumps({k: row.get(k) for k in ("date", "actualOpen", "modelPrediction", "low", "high", "hit")}, ensure_ascii=False, sort_keys=True))
if row.get("modelPrediction") != 6503.13 or row.get("low") != 6472.38 or row.get("high") != 6533.88 or row.get("hit") is not True:
    raise SystemExit("bucket verification failed")
PY

          sleep 12
          python - <<'PY'
import json
import urllib.request

req = urllib.request.Request("https://kospipreview.com/api/live/history.json", headers={"Cache-Control": "no-cache"})
with urllib.request.urlopen(req, timeout=30) as resp:
    payload = json.load(resp)
row = next(r for r in payload["records"] if r.get("date") == "2026-04-27")
print("api_verify", json.dumps({k: row.get(k) for k in ("date", "actualOpen", "modelPrediction", "low", "high", "hit")}, ensure_ascii=False, sort_keys=True))
if row.get("modelPrediction") != 6503.13 or row.get("low") != 6472.38 or row.get("high") != 6533.88 or row.get("hit") is not True:
    raise SystemExit("api verification failed")
PY