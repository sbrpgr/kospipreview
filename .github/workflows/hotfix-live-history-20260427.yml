name: Hotfix Live History 20260427

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/hotfix-live-history-20260427.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: kospipreview

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: kospipreview

      - name: Patch and verify 2026-04-27 history row
        shell: bash
        run: |
          set -euo pipefail
          service_json="$(mktemp)"
          gcloud run services describe kospi-live-data --region asia-northeast3 --format=json > "$service_json"
          BUCKET="$(jq -r '([.spec.template.spec.containers[0].env[]? | {(.name): (.value // "")}] | add // {} | .LIVE_DATA_BUCKET // "kospipreview-live-data")' "$service_json")"
          PREFIX="$(jq -r '([.spec.template.spec.containers[0].env[]? | {(.name): (.value // "")}] | add // {} | .LIVE_DATA_PREFIX // "" | sub("^/+"; "") | sub("/+$"; ""))' "$service_json")"
          blob="${PREFIX:+$PREFIX/}history.json"
          object="gs://$BUCKET/$blob"
          echo "Patching $object"

          tmp="$(mktemp)"
          patched="$(mktemp)"
          verify="$(mktemp)"
          api="$(mktemp)"

          gcloud storage cp "$object" "$tmp" --quiet
          echo "before $(jq -c '.records[] | select(.date == "2026-04-27") | {date, actualOpen, modelPrediction, low, high, hit}' "$tmp")"
          jq '(.records[] | select(.date == "2026-04-27") | .modelPrediction) = 6503.13 | (.records[] | select(.date == "2026-04-27") | .low) = 6472.38 | (.records[] | select(.date == "2026-04-27") | .high) = 6533.88 | (.records[] | select(.date == "2026-04-27") | .hit) = true | .generatedAt = (now | todateiso8601)' "$tmp" > "$patched"
          mv "$patched" "$tmp"
          echo "after $(jq -c '.records[] | select(.date == "2026-04-27") | {date, actualOpen, modelPrediction, low, high, hit}' "$tmp")"

          gcloud storage cp "$tmp" "$object" --cache-control=no-store --content-type="application/json; charset=utf-8" --quiet
          gcloud storage cp "$object" "$verify" --quiet
          echo "bucket_verify $(jq -c '.records[] | select(.date == "2026-04-27") | {date, actualOpen, modelPrediction, low, high, hit}' "$verify")"
          jq -e '.records[] | select(.date == "2026-04-27") | (.modelPrediction == 6503.13 and .low == 6472.38 and .high == 6533.88 and .hit == true)' "$verify" >/dev/null

          sleep 12
          curl -fsS -H 'Cache-Control: no-cache' https://kospipreview.com/api/live/history.json -o "$api"
          echo "api_verify $(jq -c '.records[] | select(.date == "2026-04-27") | {date, actualOpen, modelPrediction, low, high, hit}' "$api")"
          jq -e '.records[] | select(.date == "2026-04-27") | (.modelPrediction == 6503.13 and .low == 6472.38 and .high == 6533.88 and .hit == true)' "$api" >/dev/null