name: refresh-holiday-prediction

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch: {}
  schedule:
    # Every 5 minutes on weekdays; script exits early only when US market data is inactive.
    - cron: "*/5 * * * 1-5"

concurrency:
  group: refresh-holiday-prediction-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: kospipreview

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: kospipreview

      - name: Seed current JSON from Cloud Storage
        run: |
          mkdir -p frontend/public/data
          for f in prediction.json backtest_diagnostics.json \
                   holiday_prediction.json holiday_prediction_series.json holiday_history.json; do
            if ! gcloud storage cp \
              "gs://kospipreview-live-data/$f" \
              "frontend/public/data/$f" \
              --quiet; then
              if [ "$f" = "backtest_diagnostics.json" ]; then
                curl -fsSL \
                  "https://kospipreview.com/api/live/backtest_diagnostics.json" \
                  -o "frontend/public/data/$f"
                python -m json.tool "frontend/public/data/$f" >/dev/null
              fi
            fi
          done

      - name: Run independent model2 prediction
        run: python ./scripts/refresh_holiday_prediction.py

      - name: Publish model2 JSON to Cloud Storage
        run: |
          for f in holiday_prediction.json holiday_prediction_series.json holiday_history.json; do
            if [ -f "frontend/public/data/$f" ]; then
              gcloud storage cp \
                "frontend/public/data/$f" \
                "gs://kospipreview-live-data/$f" \
                --cache-control=no-store \
                --content-type="application/json; charset=utf-8" \
                --quiet
            fi
          done
