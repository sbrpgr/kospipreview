name: refresh-holiday-prediction

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force Model2 refresh outside the U.S. live/pre-market window"
        required: false
        default: "off"
      clear_stale:
        description: "Clear current Model2 JSON instead of calculating a new prediction"
        required: false
        default: "off"
  schedule:
    # Every 5 minutes on weekdays; script exits early unless KRX no-open status and U.S. market timing are valid.
    - cron: "*/5 * * * 1-5"

concurrency:
  group: refresh-holiday-prediction-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: kospipreview

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: kospipreview

      - name: Seed current JSON from Cloud Storage
        run: |
          mkdir -p frontend/public/data
          for f in prediction.json backtest_diagnostics.json \
                   holiday_prediction.json holiday_prediction_series.json holiday_history.json; do
            if ! gcloud storage cp \
              "gs://kospipreview-live-data/$f" \
              "frontend/public/data/$f" \
              --quiet; then
              if [ "$f" = "backtest_diagnostics.json" ]; then
                if curl -fsSL \
                  "https://kospipreview.com/api/live/backtest_diagnostics.json" \
                  -o "frontend/public/data/$f"; then
                  python -m json.tool "frontend/public/data/$f" >/dev/null
                else
                  echo "::warning::Using bundled backtest_diagnostics.json fallback"
                  python -m json.tool "frontend/public/data/$f" >/dev/null
                fi
              else
                echo "::warning::Could not seed $f from Cloud Storage; using bundled or generated fallback if available"
              fi
            fi
          done

      - name: Clear stale model2 JSON
        id: clear_model2
        if: ${{ github.event.inputs.clear_stale == 'on' }}
        run: |
          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          data_dir = Path("frontend/public/data")
          data_dir.mkdir(parents=True, exist_ok=True)
          now = datetime.now(timezone.utc).isoformat()

          (data_dir / "holiday_prediction.json").write_text(
              json.dumps(
                  {
                      "generatedAt": now,
                      "schemaVersion": 3,
                      "calculationMode": "model2_no_night_futures_composite",
                      "independentModel": True,
                      "usesOtherModelPrediction": False,
                      "nightFuturesUsed": False,
                      "nightFuturesReadThisRun": False,
                      "status": "cleared",
                      "clearReason": "manual_stale_model2_clear",
                      "predictionDate": None,
                      "predictionDateIso": None,
                      "pointPrediction": None,
                      "predictedChangePct": None,
                      "rangeLow": None,
                      "rangeHigh": None,
                  },
                  ensure_ascii=False,
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          (data_dir / "holiday_prediction_series.json").write_text(
              json.dumps(
                  {
                      "generatedAt": now,
                      "model": "model2",
                      "calculationMode": "model2_no_night_futures_composite",
                      "status": "cleared",
                      "clearReason": "manual_stale_model2_clear",
                      "predictionDateIso": None,
                      "records": [],
                  },
                  ensure_ascii=False,
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          (data_dir / "holiday_history.json").write_text(
              json.dumps(
                  {
                      "generatedAt": now,
                      "model": "model2",
                      "calculationMode": "model2_no_night_futures_composite",
                      "status": "cleared",
                      "clearReason": "manual_stale_model2_clear",
                      "records": [],
                  },
                  ensure_ascii=False,
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          print("cleared stale Model2 JSON files")
          PY
          echo "should_publish=true" >> "$GITHUB_OUTPUT"

      - name: Run independent model2 prediction
        id: model2
        if: ${{ github.event.inputs.clear_stale != 'on' }}
        env:
          FORCE_MODEL2_REFRESH: ${{ github.event.inputs.force || 'off' }}
        run: |
          set -o pipefail
          python ./scripts/refresh_holiday_prediction.py | tee .model2-refresh.log
          if grep -q "^wrote Model 2 independent prediction" .model2-refresh.log; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Drop invalid skipped model2 placeholders
        if: ${{ github.event.inputs.clear_stale != 'on' }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data_dir = Path("frontend/public/data")
          prediction_path = data_dir / "holiday_prediction.json"
          try:
              payload = json.loads(prediction_path.read_text(encoding="utf-8"))
          except (OSError, json.JSONDecodeError):
              payload = {}

          if payload.get("pointPrediction") is None and not payload.get("generatedAt"):
              for name in ("holiday_prediction.json", "holiday_prediction_series.json", "holiday_history.json"):
                  target = data_dir / name
                  if target.exists():
                      target.unlink()
              print("removed invalid skipped Model2 placeholder files before publish")
          PY

      - name: Publish model2 JSON to Cloud Storage
        if: ${{ steps.model2.outputs.should_publish == 'true' || steps.clear_model2.outputs.should_publish == 'true' }}
        run: |
          for f in holiday_prediction.json holiday_prediction_series.json holiday_history.json; do
            if [ -f "frontend/public/data/$f" ]; then
              gcloud storage cp \
                "frontend/public/data/$f" \
                "gs://kospipreview-live-data/$f" \
                --cache-control=no-store \
                --content-type="application/json; charset=utf-8" \
                --quiet
            fi
          done
