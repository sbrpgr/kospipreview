name: publish-youtube-news

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

concurrency:
  group: publish-youtube-news-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: kospipreview

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: kospipreview

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Generate YouTube news index
        working-directory: frontend
        run: npm run sync-news

      - name: Publish YouTube news index
        run: |
          gcloud storage cp \
            frontend/public/data/youtube-news.json \
            gs://kospipreview-live-data/youtube-news/youtube-news.json \
            --cache-control=no-store \
            --content-type="application/json; charset=utf-8"
