name: deploy-hosting

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

concurrency:
  group: deploy-hosting-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: kospipreview

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: |
          rm -rf out
          npm run build

      - name: Deploy Firebase Hosting
        shell: bash
        run: |
          set +e
          npx firebase-tools@latest deploy --project kospipreview --only hosting --non-interactive 2>&1 | tee firebase-deploy.log
          status="${PIPESTATUS[0]}"
          set -e

          if [ "$status" -ne 0 ]; then
            if grep -q "is the current active version" firebase-deploy.log; then
              echo "::warning::Firebase Hosting reported the finalized version is already active; treating as deployed."
              exit 0
            fi
            exit "$status"
          fi
