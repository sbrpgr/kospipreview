name: retrain-model

on:
  workflow_dispatch:
  schedule:
    # 매일 KST 06:00 (UTC 21:00 전날), KST 18:00 (UTC 09:00) — 하루 2회
    - cron: "0 21 * * *"
    - cron: "0 9 * * *"

permissions:
  contents: write   # git push 허용

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rebuild model artifacts
        run: python ./scripts/backtest_and_generate.py

      # ─── 프론트엔드 빌드 ──────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # ─── 갱신된 JSON을 레포에 커밋 후 푸시 ────────────────────────
      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/*.json
          # 변경이 없으면 커밋 건너뜀
          git diff --cached --quiet || git commit -m "chore: auto-update data $(date -u +'%Y-%m-%d %H:%M UTC')"

      - name: Push changes
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}

      # ─── Firebase 호스팅 배포 (빌드 완료 후) ─────────────────────
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: kospipreview
          channelId: live
