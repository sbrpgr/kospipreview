name: retrain-model

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      loop:
        description: "Keep chaining this workflow continuously after each successful run"
        required: false
        default: "on"
  schedule:
    - cron: "*/5 * * * 1-5"

concurrency:
  group: retrain-model-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rebuild model artifacts
        run: python ./scripts/backtest_and_generate.py

      - name: Restore static export cache
        id: static-export-cache
        uses: actions/cache@v4
        with:
          path: frontend/out
          key: next-export-${{ runner.os }}-${{ hashFiles('frontend/src/**', 'frontend/package-lock.json', 'frontend/next.config.ts', 'frontend/tsconfig.json') }}-${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}

      - name: Setup Node
        if: steps.static-export-cache.outputs.cache-hit != 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        if: steps.static-export-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        if: steps.static-export-cache.outputs.cache-hit != 'true'
        working-directory: frontend
        env:
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Sync latest data into static export
        shell: bash
        run: |
          mkdir -p frontend/out/data
          cp frontend/public/data/*.json frontend/out/data/

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/*.json
          git diff --cached --quiet || git commit -m "chore: auto-update data $(date -u +'%Y-%m-%d %H:%M UTC')"

      - name: Push changes
        run: |
          # Guard against transient untracked/unstaged files generated during the job.
          git pull --rebase --autostash origin "${{ github.ref_name }}"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Prepare Firebase credentials
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT secret is missing." >&2
            exit 1
          fi

          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --project kospipreview --only hosting --non-interactive

      - name: Queue next polling run
        if: success() && github.event_name == 'workflow_dispatch' && github.event.inputs.loop == 'on'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # Re-dispatch after a short delay; practical cadence becomes one cycle per workflow runtime.
          sleep 5

          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/retrain-model.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"loop\":\"on\"}}"
