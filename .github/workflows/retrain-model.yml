name: retrain-model

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      loop:
        description: "Keep chaining this workflow continuously after each successful run"
        required: false
        default: "on"
  schedule:
    - cron: "*/5 * * * 1-5"

concurrency:
  group: retrain-model-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: read

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: kospipreview

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: kospipreview

      - name: Seed current JSON from Cloud Storage
        run: |
          shopt -s nullglob
          mkdir -p .live-data-seed/bundled .live-data-seed/bucket frontend/public/data
          cp frontend/public/data/prediction_archive.json .live-data-seed/bundled/prediction_archive.json || true
          if ! gcloud storage cp \
            "gs://kospipreview-live-data/*.json" \
            .live-data-seed/bucket/ \
            --quiet; then
            echo "::warning::Cloud Storage seed copy was incomplete; continuing with files copied plus bundled fallbacks."
          fi
          bucket_json=(.live-data-seed/bucket/*.json)
          if [ ${#bucket_json[@]} -gt 0 ]; then
            cp "${bucket_json[@]}" frontend/public/data/
          else
            echo "::warning::No Cloud Storage JSON seed files were copied; using bundled data only."
          fi
          python ./scripts/merge_live_data_seed.py \
            --archive-fallback .live-data-seed/bundled/prediction_archive.json \
            --archive-bucket .live-data-seed/bucket/prediction_archive.json \
            --archive-output frontend/public/data/prediction_archive.json

      - name: Rebuild model artifacts
        run: python ./scripts/backtest_and_generate.py

      - name: Refresh night futures and live prediction series
        run: python ./scripts/refresh_night_futures.py

      - name: Refresh model2 (independent EWY/FX composite)
        run: python ./scripts/refresh_holiday_prediction.py || true

      - name: Preserve existing prediction snapshot
        run: |
          python ./scripts/merge_live_data_seed.py \
            --prediction-fallback .live-data-seed/bucket/prediction.json \
            --prediction-output frontend/public/data/prediction.json \
            --prediction-series frontend/public/data/live_prediction_series.json

      - name: Preserve existing history verification fields
        run: |
          python ./scripts/merge_live_data_seed.py \
            --history-fallback .live-data-seed/bucket/history.json \
            --history-output frontend/public/data/history.json

      - name: Drop invalid skipped model2 placeholders
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data_dir = Path("frontend/public/data")
          prediction_path = data_dir / "holiday_prediction.json"
          try:
              payload = json.loads(prediction_path.read_text(encoding="utf-8"))
          except (OSError, json.JSONDecodeError):
              payload = {}

          if payload.get("pointPrediction") is None and not payload.get("generatedAt"):
              for name in ("holiday_prediction.json", "holiday_prediction_series.json", "holiday_history.json"):
                  target = data_dir / name
                  if target.exists():
                      target.unlink()
              print("removed invalid skipped Model2 placeholder files before publish")
          PY

      - name: Publish generated JSON to Cloud Storage
        run: |
          gcloud storage cp \
            frontend/public/data/*.json \
            gs://kospipreview-live-data/ \
            --cache-control=no-store \
            --content-type="application/json; charset=utf-8" \
            --quiet
          if [ -d frontend/public/data/intraday_indicator_series ]; then
            gcloud storage cp \
              frontend/public/data/intraday_indicator_series \
              gs://kospipreview-live-data/ \
              --recursive \
              --cache-control=no-store \
              --content-type="application/json; charset=utf-8" \
              --quiet
          fi

      - name: Queue next polling run
        if: success() && github.event_name == 'workflow_dispatch' && github.event.inputs.loop == 'on'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          # Re-dispatch after a short delay; practical cadence becomes one cycle per workflow runtime.
          sleep 5

          curl --fail --silent --show-error -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/retrain-model.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"loop\":\"on\"}}"
