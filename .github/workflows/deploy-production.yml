name: deploy-production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: kospipreview

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: kospipreview

      - name: Deploy Cloud Run live data service
        run: |
          gcloud run deploy kospi-live-data \
            --source . \
            --project kospipreview \
            --region asia-northeast3 \
            --allow-unauthenticated \
            --update-env-vars LIVE_DATA_BUCKET=kospipreview-live-data \
            --quiet

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Deploy Firebase Hosting
        run: npx firebase-tools@latest deploy --project kospipreview --only hosting --non-interactive
