name: deploy-production

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: kospipreview

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: kospipreview

      - name: Deploy Cloud Run live data service
        env:
          REFRESH_BEARER_TOKEN: ${{ secrets.REFRESH_BEARER_TOKEN }}
        run: |
          if [ -z "${REFRESH_BEARER_TOKEN:-}" ]; then
            echo "::error::REFRESH_BEARER_TOKEN GitHub secret is required for the Cloud Scheduler refresh endpoint"
            exit 1
          fi

          IMAGE="gcr.io/kospipreview/kospi-live-data:${GITHUB_SHA}"
          gcloud builds submit \
            --project kospipreview \
            --tag "$IMAGE" \
            --suppress-logs \
            --quiet

          gcloud run deploy kospi-live-data \
            --image "$IMAGE" \
            --project kospipreview \
            --region asia-northeast3 \
            --allow-unauthenticated \
            --update-env-vars "LIVE_DATA_BUCKET=kospipreview-live-data,REFRESH_BEARER_TOKEN=${REFRESH_BEARER_TOKEN},LIVE_JSON_CACHE_SECONDS=10,MAX_REFRESH_BODY_BYTES=1024,REFRESH_TIMEOUT_SECONDS=240,NEWS_BUCKET_NAME=kospipreview-live-data,NEWS_STORAGE_PREFIX=youtube-news,NEWS_INDEX_FILE_NAME=youtube-news.json,NEWS_CACHE_SECONDS=15" \
            --quiet

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ vars.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Deploy Firebase Hosting
        run: npx firebase-tools@latest deploy --project kospipreview --only hosting --non-interactive
