name: save-market-snapshot

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # 평일 16:30 KST (07:30 UTC) — 코스피 장 마감 직후
  schedule:
    - cron: "30 7 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: save-market-snapshot-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: kospipreview

      - name: Save market snapshot to Cloud Storage
        env:
          LIVE_DATA_BUCKET: kospipreview-live-data
        run: python ./scripts/save_market_snapshot.py
