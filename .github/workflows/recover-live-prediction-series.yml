name: recover-live-prediction-series

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      kst_date:
        description: "KST date partition(s), e.g. 2026-06-05,2026-06-06"
        required: true
      prediction_date:
        description: "Prediction date partition, e.g. 2026-06-08"
        required: true
      min_records:
        description: "Minimum recovered record count"
        required: false
        default: "30"

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          project_id: kospipreview

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: kospipreview

      - name: Download current series and intraday snapshots
        run: |
          mkdir -p .recover/intraday frontend/public/data
          gcloud storage cp \
            gs://kospipreview-live-data/live_prediction_series.json \
            frontend/public/data/live_prediction_series.json \
            --quiet
          IFS=',' read -ra KST_DATES <<< "${{ github.event.inputs.kst_date }}"
          for raw_date in "${KST_DATES[@]}"; do
            kst_date="$(echo "$raw_date" | xargs)"
            if [ -z "$kst_date" ]; then
              continue
            fi
            gcloud storage cp \
              "gs://kospipreview-live-data/intraday_indicator_series/kst_date=${kst_date}/prediction_date=${{ github.event.inputs.prediction_date }}/*.json" \
              .recover/intraday/ \
              --quiet
          done
          snapshot_count="$(find .recover/intraday -type f -name '*.json' | wc -l | xargs)"
          if [ "$snapshot_count" -eq 0 ]; then
            echo "No intraday snapshots were downloaded."
            exit 1
          fi

      - name: Rebuild live prediction series
        run: |
          python ./scripts/recover_live_prediction_series.py \
            --snapshot-dir .recover/intraday \
            --current-series frontend/public/data/live_prediction_series.json \
            --output frontend/public/data/live_prediction_series.json \
            --prediction-date "${{ github.event.inputs.prediction_date }}" \
            --min-records "${{ github.event.inputs.min_records }}"

      - name: Publish recovered live prediction series
        run: |
          gcloud storage cp \
            frontend/public/data/live_prediction_series.json \
            gs://kospipreview-live-data/live_prediction_series.json \
            --cache-control=no-store \
            --content-type="application/json; charset=utf-8" \
            --quiet
